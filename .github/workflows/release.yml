name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ups_monitor.spec --clean --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress
        continue-on-error: true

      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc installer.iss
          } else {
            Write-Host "Inno Setup not found, skipping installer build"
          }
        shell: pwsh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Download ViewPower Installer
        run: |
          Invoke-WebRequest -Uri "https://www.power-software-download.com/viewpower/installViewPower_Windows.zip" -OutFile "installViewPower_Windows.zip"
        shell: pwsh

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UPS Power Monitor ${{ github.ref_name }}
          files: |
            release/UPS-Power-Monitor-Setup-*.exe
            installViewPower_Windows.zip
          draft: false
          prerelease: false
