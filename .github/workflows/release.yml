name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask requests pywebview pystray pillow beautifulsoup4 pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ups_monitor.spec --clean --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress
        continue-on-error: true

      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc installer.iss
          } else {
            Write-Host "Inno Setup not found, skipping installer build"
          }
        shell: pwsh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: UPS Power Monitor ${{ github.ref_name }}
          body: |
            ## UPS Power Monitor ${{ github.ref_name }}

            ### 🚀 What's New in v1.4.0

            #### 🔋 Battery Health Tracker
            - New **Battery Health** card in the Analytics tab showing health percentage, color-coded status (Good / Fair / Replace), and battery age in days
            - Set the **battery replacement date** directly from the Settings tab — health score updates automatically
            - Smart health score algorithm accounting for battery age, average load, and discharge cycles
            - Automatic **ntfy.sh push notifications** and **tray alerts** when battery health falls below warning thresholds

            #### 🧾 Dynamic CEB Bill Calculator
            - Full **D-2026/05 tariff structure** implementation matching the latest Ceylon Electricity Board rate slabs
            - Fixed charge now **automatically adjusts** based on your total consumption (no more static fixed fee)
            - Itemised bill breakdown showing each slab, units used per slab, and sub-totals
            - Auto-hides the Temperature tile in the Vitals grid for UPS models that don't report temperature

            #### 🎨 Premium UI Refresh
            - Smooth **tab transition animations** — pages slide/fade when switching tabs
            - **Micro-animations** on cards, buttons, stat tiles, and inputs (hover lift, glow focus rings)
            - Custom **scrollbar styling** and polished form controls throughout
            - All modals and dropdowns now animate in and out

            #### ⚡ On-Battery Warning Theme
            - When the UPS switches to **battery power**, the entire UI shifts to an **amber/red warning theme**
            - Pulsing vignette border around the viewport signals battery mode at a glance
            - Alert glows and accent colours shift to warn colours — instantly recognisable even at a distance
            - Reverts automatically to normal theme when mains power is restored

            #### 🐛 Bug Fixes
            - Prevented scroll-wheel from accidentally changing number inputs (fixes electricity rate drift)
            - Added server-side validation for all settings to prevent invalid values being saved
            - Fixed empty space left when the Temperature tab/tile was hidden
            - Filtered out spurious `0.0 °C` temperature readings from unsupported models

            ---

            ### Installation
            1. Download `UPS-Power-Monitor-Setup-*.exe` below
            2. Run the installer — it handles everything automatically
            3. UPS Power Monitor will start after installation

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - Microsoft Edge WebView2 Runtime (pre-installed on Win10 20H2+)
            - ViewPower software running on the same machine

            ### What's included
            - Standalone app (no Python required)
            - Desktop shortcut
            - Optional autostart at login
            - Built-in auto-updater — checks GitHub for new releases
          files: |
            release/UPS-Power-Monitor-Setup-*.exe
          draft: false
          prerelease: false
